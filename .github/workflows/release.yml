name: Build Release Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        default: "v0.2.0"
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "$VERSION" > macos/VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        shell: bash
        run: |
          cd macos
          swift package resolve
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/build/417ssh-${{ steps.version.outputs.version }}-mac.dmg
          if-no-files-found: error

  windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart("v")
          Set-Content -Path windows\VERSION -Value $version -Encoding UTF8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI
        shell: pwsh
        run: |
          cd windows
          $env:VERSION = "${{ steps.version.outputs.version }}"
          .\build_msi.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: windows/dist/417ssh-${{ steps.version.outputs.version }}-win.msi
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - macos-dmg
      - windows-msi
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: 417ssh ${{ steps.version.outputs.version }}
          body: |
            417ssh ${{ steps.version.outputs.version }} installers.

            Downloads:
            - macOS: `417ssh-${{ steps.version.outputs.version }}-mac.dmg`
            - Windows: `417ssh-${{ steps.version.outputs.version }}-win.msi`
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            release-assets/417ssh-${{ steps.version.outputs.version }}-mac.dmg
            release-assets/417ssh-${{ steps.version.outputs.version }}-win.msi
