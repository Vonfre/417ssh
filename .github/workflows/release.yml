name: Build Release Installers

run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.4"
        required: true
        default: "v0.2.4"
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print tool versions
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            echo "Release tag must look like v0.2.4, got: $TAG" >&2
            exit 1
          fi
          echo "$VERSION" > macos/VERSION
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        shell: bash
        run: |
          set -euo pipefail
          cd macos
          chmod +x scripts/build_app.sh scripts/build_dmg.sh
          swift package resolve
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build_dmg.sh
          test -f "build/417ssh-${{ steps.version.outputs.version }}-mac.dmg"
          ls -lh "build/417ssh-${{ steps.version.outputs.version }}-mac.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/build/417ssh-${{ steps.version.outputs.version }}-mac.dmg
          if-no-files-found: error

  windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          $tag = $tag -replace '^refs/tags/', ''
          $version = $tag.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq $tag) {
            throw "Release tag must look like v0.2.4, got: $tag"
          }
          Set-Content -Path windows\VERSION -Value $version -Encoding UTF8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            windows/requirements.txt
            windows/requirements-build.txt

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $toolsPath = "$env:USERPROFILE\.dotnet\tools"
          $toolsPath | Out-File -FilePath $env:GITHUB_PATH -Append
          $env:PATH = "$toolsPath;$env:PATH"
          wix --version

      - name: Build MSI
        shell: pwsh
        run: |
          cd windows
          $env:VERSION = "${{ steps.version.outputs.version }}"
          .\build_msi.ps1
          if (-not (Test-Path "dist\417ssh-${{ steps.version.outputs.version }}-win.msi")) {
            throw "MSI was not created"
          }
          Get-Item "dist\417ssh-${{ steps.version.outputs.version }}-win.msi" | Format-List FullName,Length

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: windows/dist/417ssh-${{ steps.version.outputs.version }}-win.msi
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - macos-dmg
      - windows-msi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          PRERELEASE="${{ inputs.prerelease }}"
          if [[ "$PRERELEASE" != "true" ]]; then
            PRERELEASE="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          ls -lh release-assets
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-mac.dmg"
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-win.msi"
          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: 417ssh ${{ steps.version.outputs.version }}
          body: |
            417ssh ${{ steps.version.outputs.version }} installers.

            Downloads:
            - macOS: `417ssh-${{ steps.version.outputs.version }}-mac.dmg`
            - Windows: `417ssh-${{ steps.version.outputs.version }}-win.msi`

            If macOS blocks the app on first launch, open it once from Finder with right click -> Open.
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/417ssh-${{ steps.version.outputs.version }}-mac.dmg
            release-assets/417ssh-${{ steps.version.outputs.version }}-win.msi
            release-assets/SHA256SUMS.txt
