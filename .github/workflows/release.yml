name: Build Release Packages

run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.6"
        required: true
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app-zip:
    name: Build macOS app ZIP
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print tool versions
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          swift --version
          python3 --version

      - name: Install icon build dependency
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$GITHUB_WORKSPACE/macos/.venv-icon"
          "$GITHUB_WORKSPACE/macos/.venv-icon/bin/python" -m pip install --upgrade pip
          "$GITHUB_WORKSPACE/macos/.venv-icon/bin/python" -m pip install Pillow
          echo "$GITHUB_WORKSPACE/macos/.venv-icon/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            echo "Release tag must look like v<version>, got: $TAG" >&2
            exit 1
          fi
          echo "$VERSION" > macos/VERSION
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app ZIP
        shell: bash
        run: |
          set -euo pipefail
          cd macos
          chmod +x scripts/build_app.sh scripts/build_zip.sh
          swift package resolve
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build_zip.sh
          test -f "build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"
          ls -lh "build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"

      - name: Upload macOS ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-zip
          path: macos/build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip
          if-no-files-found: error

  windows-portable-zip:
    name: Build Windows portable ZIP
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          $tag = $tag -replace '^refs/tags/', ''
          $version = $tag.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq $tag) {
            throw "Release tag must look like v<version>, got: $tag"
          }
          Set-Content -Path windows\VERSION -Value $version -Encoding UTF8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            windows/requirements.txt
            windows/requirements-build.txt

      - name: Build portable ZIP
        shell: pwsh
        run: |
          cd windows
          $env:VERSION = "${{ steps.version.outputs.version }}"
          .\build_portable.ps1
          if (-not (Test-Path "dist\417ssh-${{ steps.version.outputs.version }}-win-portable.zip")) {
            throw "Windows portable ZIP was not created"
          }
          Get-Item "dist\417ssh-${{ steps.version.outputs.version }}-win-portable.zip" | Format-List FullName,Length

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip
          path: windows/dist/417ssh-${{ steps.version.outputs.version }}-win-portable.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - macos-app-zip
      - windows-portable-zip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          PRERELEASE="${{ inputs.prerelease }}"
          if [[ "$PRERELEASE" != "true" ]]; then
            PRERELEASE="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          ls -lh release-assets
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-win-portable.zip"
          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<NOTES
          417ssh $VERSION portable packages.

          Highlights:
          - Windows configuration and SFTP workspace UI were tightened: clearer primary actions, plain numeric port fields without spin arrows, and a visible SFTP tab add button.
          - Windows startup is lighter because the Qt app skips the legacy Tk UI path and lazy-loads Qt WebEngine only when embedded pages or the real terminal are used.
          - Windows portable packaging now uses an onedir app folder, so 417ssh.exe is no longer a giant single-file executable and startup/update replacement is more reliable.
          - Windows settings now show update download progress, and the background updater extracts the downloaded portable zip after the app exits before replacing the current folder.
          - Windows UI styling is tightened toward the macOS app with a softer sidebar, denser profile rows, smoother buttons, and more compact SFTP host cards.
          - Legacy Windows builds before this updater may need one manual zip replacement because the old batch updater could kill its own cmd process while showing `find "<PID>"`.
          - Windows download-and-install updates now run through a hidden background PowerShell updater instead of opening a visible cmd/Windows Terminal window.
          - Windows updater writes an install log, backs up the current portable folder, and attempts rollback plus app restart if replacement fails.
          - Windows built-in terminal now uses a bundled xterm.js terminal emulator connected to the Paramiko SSH PTY, instead of rendering terminal output in a simulated text box.
          - Windows terminal now lets xterm.js handle ANSI, cursor movement, alternate screen, full-screen terminal apps, selection, paste, and resize behavior.
          - Windows now keeps Jupyter/RStudio tunnels and terminal sessions per workspace, matching the macOS behavior when switching between workspaces.
          - Windows built-in terminal accepts keyboard input directly in the terminal pane through the SSH PTY, with Ctrl-C, paste, arrow keys, and PTY resize support.
          - Windows terminal still tracks OSC 7 and typed \`cd ...\` commands for SFTP directory sync while passing the raw terminal stream to xterm.js.
          - Windows portable startup now bundles the dynamically loaded core module dependencies, including uuid, tkinter, and Paramiko.
          - Terminal SFTP path-to-terminal now inserts \`cd <path>\`, so pressing Enter in the terminal enters that directory directly.
          - Sync-to-terminal-folder and auto-sync no longer inject a visible \`printf ...\` probe into the shell.
          - Auto-sync follows terminal \`cd ...\` commands and OSC 7 current-directory reports, then refreshes the SFTP side panel.
          - Workspace switching now keeps web tunnels, terminal sessions, and SFTP browser state alive instead of tearing down connections when you leave the page.
          - Terminal workspaces add three SFTP side-panel actions: copy the current SFTP path into the terminal, sync the SFTP pane to the terminal folder, and auto-sync with terminal folder changes.
          - Terminal SFTP side panels keep per-profile path, listing, filter, cached directory, and connection state so another workspace does not overwrite the active file browser.
          - The built-in SFTP workspace is named SFTP, and Hosts start with local host only; terminal workspaces appear there automatically, while extra SFTP sources are created through Add custom SFTP.
          - SFTP Host cards are more compact and easier to click across the whole card area.
          - Pure SFTP still has a single sidebar workspace entry, but each top tab now contains a left/right A/B pair for direct transfers.
          - The A side opens local host \`127.0.0.1\` by default; A and B can each choose local files, terminal workspaces, or custom SFTP profiles from Hosts.
          - A/B panes keep independent source, path, selection, filter, sorting, and cached directory state while switching tabs.
          - Custom SFTP Hosts are managed explicitly inside the Hosts area with Add, Edit, and Delete buttons instead of right-click deletion.
          - Existing extra SFTP profiles are hidden from the sidebar but remain available as custom SFTP Hosts sources.
          - Local-to-remote drag uploads, remote-to-local drag downloads, and remote-to-remote drag transfer are supported between the A/B panes.
          - SFTP pane toolbars and file rows remain compact, leaving more room for the actual file list.
          - Profile editor imports existing \`ssh ...\` commands inline, without a separate popup, and fills host, jump host, forwarding, flags, and identity file fields.
          - Sidebar actions are simplified to Add, Delete, and Settings; Add opens a workspace-type menu.
          - New profiles can be canceled directly; canceling removes the temporary blank profile instead of leaving it behind.
          - Blank SFTP workspaces no longer auto-select another saved server; empty profiles stay local until configured.
          - Drag and drop now supports local uploads and remote item transfer between SFTP panes, including the terminal SFTP side panel.
          - SFTP file browser supports right-click actions: open, download, copy, rename, delete, refresh, new folder, and permission editing.
          - The terminal file browser is now a collapsible side panel instead of being shown all the time.
          - Directory navigation updates the path immediately, uses cached listings when available, and refreshes in the background.
          - File tables support header sorting by name, modified time, size, and type.
          - macOS SFTP uses SSH connection multiplexing for faster repeated directory/file operations.
          - Windows SFTP reuses Paramiko SSH connections per profile for faster browsing and multi-server panes.

          Downloads:
          - macOS: \`417ssh-$VERSION-mac-app.zip\`
          - Windows: \`417ssh-$VERSION-win-portable.zip\`

          macOS:
          1. Unzip \`417ssh-$VERSION-mac-app.zip\`.
          2. Run \`417ssh.app\`, or drag it to Applications first.
          3. If macOS says Apple cannot verify \`417ssh\`, click Done, do not move it to Trash. Then right click \`417ssh.app\` in Finder and choose Open.
          4. A Chinese first-run guide is included as \`README-macOS.txt\` inside the zip.

          Windows: unzip the folder and run \`417ssh.exe\`.
          NOTES

          release_args=(
            --repo "$GITHUB_REPOSITORY"
            --title "417ssh $VERSION"
            --notes-file release-notes.md
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" "${release_args[@]}"
          else
            gh release create "$TAG" "${release_args[@]}"
          fi

          gh release upload "$TAG" \
            "release-assets/417ssh-$VERSION-mac-app.zip" \
            "release-assets/417ssh-$VERSION-win-portable.zip" \
            "release-assets/SHA256SUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
