name: Build Release Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        default: "v0.2.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "$VERSION" > macos/VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        shell: bash
        run: |
          cd macos
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/build/417ssh-${{ steps.version.outputs.version }}-mac.dmg
          if-no-files-found: error

  windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart("v")
          Set-Content -Path windows\VERSION -Value $version -Encoding UTF8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI
        shell: pwsh
        run: |
          cd windows
          $env:VERSION = "${{ steps.version.outputs.version }}"
          .\build_msi.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: windows/dist/417ssh-${{ steps.version.outputs.version }}-win.msi
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - macos-dmg
      - windows-msi
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "417ssh $VERSION" --notes "417ssh $VERSION installers."
          else
            gh release create "$TAG" --title "417ssh $VERSION" --notes "417ssh $VERSION installers."
          fi
          gh release upload "$TAG" release-assets/* --clobber
