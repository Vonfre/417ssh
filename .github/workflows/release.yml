name: Build Release Packages

run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.6"
        required: true
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app-zip:
    name: Build macOS app ZIP
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print tool versions
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          swift --version
          python3 --version

      - name: Install icon build dependency
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$GITHUB_WORKSPACE/macos/.venv-icon"
          "$GITHUB_WORKSPACE/macos/.venv-icon/bin/python" -m pip install --upgrade pip
          "$GITHUB_WORKSPACE/macos/.venv-icon/bin/python" -m pip install Pillow
          echo "$GITHUB_WORKSPACE/macos/.venv-icon/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            echo "Release tag must look like v<version>, got: $TAG" >&2
            exit 1
          fi
          echo "$VERSION" > macos/VERSION
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app ZIP
        shell: bash
        run: |
          set -euo pipefail
          cd macos
          chmod +x scripts/build_app.sh scripts/build_zip.sh
          swift package resolve
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build_zip.sh
          test -f "build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"
          ls -lh "build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"

      - name: Upload macOS ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-zip
          path: macos/build/417ssh-${{ steps.version.outputs.version }}-mac-app.zip
          if-no-files-found: error

  windows-portable-zip:
    name: Build Windows native portable ZIP
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          $tag = $tag -replace '^refs/tags/', ''
          $version = $tag.TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq $tag) {
            throw "Release tag must look like v<version>, got: $tag"
          }
          Set-Content -Path windows\VERSION -Value $version -Encoding UTF8
          Set-Content -Path windows-native\VERSION -Value $version -Encoding UTF8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build native portable ZIP
        shell: pwsh
        run: |
          cd windows-native
          $env:VERSION = "${{ steps.version.outputs.version }}"
          .\build_portable.ps1
          if (-not (Test-Path "dist\417ssh-${{ steps.version.outputs.version }}-win-portable.zip")) {
            throw "Windows native portable ZIP was not created"
          }
          Get-Item "dist\417ssh-${{ steps.version.outputs.version }}-win-portable.zip" | Format-List FullName,Length

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip
          path: windows-native/dist/417ssh-${{ steps.version.outputs.version }}-win-portable.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - macos-app-zip
      - windows-portable-zip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          PRERELEASE="${{ inputs.prerelease }}"
          if [[ "$PRERELEASE" != "true" ]]; then
            PRERELEASE="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          ls -lh release-assets
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-mac-app.zip"
          test -f "release-assets/417ssh-${{ steps.version.outputs.version }}-win-portable.zip"
          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<NOTES
          417ssh $VERSION portable packages.

          Highlights:
          - 0.6.2 fixes Windows SSH/SFTP/terminal connection errors caused by treating \`0.0.0.0\` or \`::\` as a target address. Port-forward service hosts using those unspecified addresses are normalized to \`127.0.0.1\`, while invalid SSH target hosts now show a Chinese validation message.
          - Windows terminal workspaces now include Ctrl+C and an "原生终端" action that opens the current profile through Windows Terminal or \`cmd.exe\` with system \`ssh.exe\`.
          - 0.6.1 fixed a Windows startup failure path by avoiding WebView2 creation on the first screen and writing native crash logs to \`%LOCALAPPDATA%\\417ssh\\logs\\windows-native.log\`.
          - If embedded WebView2 fails, Windows keeps the main window open and falls back to the system browser for Jupyter/RStudio pages.
          - Windows has been rebuilt as a native WPF/.NET 8 app instead of the old Python/PySide6/QtWebEngine package.
          - Windows keeps the same profile file at \`%APPDATA%\\417ssh\\profiles.json\`, so existing saved workspaces continue to load locally.
          - Windows terminal is now an embedded xterm.js terminal connected to an SSH.NET PTY ShellStream.
          - Windows Jupyter/RStudio workspaces use WebView2 and SSH.NET local port forwarding.
          - Windows SFTP uses SSH.NET SftpClient with persistent per-host sessions, local host support, A/B dual-pane tabs, drag-and-drop transfer, sorting, and Chinese right-click actions.
          - Terminal workspaces include the SFTP side panel actions for \`cd <path>\`, sync to terminal folder, and auto-sync from terminal directory changes.
          - The native Windows settings page can check GitHub Releases, show download progress, download the portable zip to LocalAppData, and install it after the app exits without opening a visible command prompt.
          - The legacy Python Windows implementation remains in the repository for reference, but the 0.6.0 Windows download is produced from \`windows-native\`.

          Downloads:
          - macOS: \`417ssh-$VERSION-mac-app.zip\`
          - Windows: \`417ssh-$VERSION-win-portable.zip\`

          macOS:
          1. Unzip \`417ssh-$VERSION-mac-app.zip\`.
          2. Run \`417ssh.app\`, or drag it to Applications first.
          3. If macOS says Apple cannot verify \`417ssh\`, click Done, do not move it to Trash. Then right click \`417ssh.app\` in Finder and choose Open.
          4. A Chinese first-run guide is included as \`README-macOS.txt\` inside the zip.

          Windows: unzip the folder and run \`417ssh.exe\`.
          NOTES

          release_args=(
            --repo "$GITHUB_REPOSITORY"
            --title "417ssh $VERSION"
            --notes-file release-notes.md
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" "${release_args[@]}"
          else
            gh release create "$TAG" "${release_args[@]}"
          fi

          gh release upload "$TAG" \
            "release-assets/417ssh-$VERSION-mac-app.zip" \
            "release-assets/417ssh-$VERSION-win-portable.zip" \
            "release-assets/SHA256SUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
